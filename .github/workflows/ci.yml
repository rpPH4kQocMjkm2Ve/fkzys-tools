name: CI

on:
  push:
    paths:
      - 'bin/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          shellcheck bin/bash-lint bin/bash-coverage bin/fkzys-audit

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: |
          for t in tests/test_bash_lint.sh tests/test_fkzys_audit.sh tests/test_bash_coverage.sh; do
            echo "━━━ $t ━━━"
            bash "$t" || exit 1
          done
